<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <!-- iOS / iPad standalone web app support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ambient Display">

  <title>Ambient Display</title>
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/layouts.css">
  <link rel="stylesheet" href="css/assets.css">
  <link rel="stylesheet" href="widgets/clock.css">
</head>
<body>
  <!-- Root mount point for the display renderer -->
  <div id="ambient-root" class="ambient-root"></div>

  <noscript>
    <p class="ambient-noscript">Ambient Display requires JavaScript to run.</p>
  </noscript>

  <!--
    Script load order matters: each file attaches to the shared AmbientDisplay
    namespace before app.js bootstraps the platform.
  -->
  <script src="js/storage.js"></script>
  <script src="js/config-loader.js"></script>
  <script src="js/theme-engine.js"></script>
  <script src="js/layout-engine.js"></script>
  <script src="js/asset-manager.js"></script>
  <script src="js/widget-registry.js"></script>
  <script src="widgets/clock.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/scheduler.js"></script>
  <script src="js/sw-register.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
