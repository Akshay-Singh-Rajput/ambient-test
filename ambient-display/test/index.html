<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Ambient Display — Test Harness</title>
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/layouts.css">
  <link rel="stylesheet" href="../css/assets.css">
  <link rel="stylesheet" href="../widgets/clock.css">
  <link rel="stylesheet" href="test-harness.css">
</head>
<body>
  <div id="test-toolbar" class="test-toolbar">
    <span class="test-toolbar__badge">TEST</span>
    <span id="test-info" class="test-toolbar__info">Loading…</span>
    <select id="test-scene-select" class="test-toolbar__select" hidden>
      <option value="">— force scene —</option>
      <option value="morning">morning</option>
      <option value="day">day</option>
      <option value="evening">evening</option>
      <option value="night">night</option>
    </select>
  </div>

  <div id="ambient-root" class="ambient-root ambient-root--test"></div>

  <script src="../js/storage.js"></script>
  <script src="../js/config-loader.js"></script>
  <script src="../js/theme-engine.js"></script>
  <script src="../js/layout-engine.js"></script>
  <script src="../js/asset-manager.js"></script>
  <script src="../js/widget-registry.js"></script>
  <script src="../widgets/clock.js"></script>
  <script src="../js/renderer.js"></script>
  <script src="../js/scheduler.js"></script>
  <script src="test-harness.js"></script>
</body>
</html>
